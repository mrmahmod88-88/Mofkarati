<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>مفكرتي - المواعيد والمهام</title>
<meta name="description" content="دفتر شخصي لتسجيل المواعيد والمهام مع تكرار وتذكيرات وحالات إنجاز" />

<!-- PWA / installability -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#16233A" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400..700&family=Noto+Sans+Arabic:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap');

  body { margin:0; font-family:'Noto Sans Arabic',sans-serif; -webkit-tap-highlight-color: transparent; }
  input[type="date"], input[type="time"] { direction: ltr; text-align: right; }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------------------------------------------------------------------- */
/* Design tokens                                                          */
/* ---------------------------------------------------------------------- */
const C = {
  ink: "#16233A", inkSoft: "#3A4A63", paper: "#EEF1F5", card: "#FFFFFF", line: "#DCE1E8",
  gold: "#C98A2C", goldSoft: "#F4E3C4", teal: "#2A7F7E", tealSoft: "#DBEEEC",
  green: "#3F7D63", greenSoft: "#E1EFE6", rust: "#B34A3C", rustSoft: "#F6E1DE",
  stone: "#8B8C89", stoneSoft: "#E9E8E3",
};
const FONT_HEAD = "'Noto Naskh Arabic', serif";
const FONT_MONO = "'JetBrains Mono', monospace";

/* ---------------------------------------------------------------------- */
/* Minimal inline icon set (no external icon library needed)              */
/* ---------------------------------------------------------------------- */
function Ico({ size = 18, color = "currentColor", strokeWidth = 2, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {children}
    </svg>
  );
}
const IconPlus = (p) => <Ico {...p}><path d="M12 5v14M5 12h14" /></Ico>;
const IconSearch = (p) => <Ico {...p}><circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" /></Ico>;
const IconBell = (p) => <Ico {...p}><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z" /><path d="M10 20a2 2 0 004 0" /></Ico>;
const IconBellRinging = (p) => <Ico {...p}><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z" /><path d="M10 20a2 2 0 004 0" /><path d="M3 6l2 1.5M21 6l-2 1.5" /></Ico>;
const IconCalendar = (p) => <Ico {...p}><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M8 3v4M16 3v4M3 10h18" /></Ico>;
const IconList = (p) => <Ico {...p}><rect x="3" y="4" width="18" height="17" rx="2" /><path d="M7.5 9h9M7.5 13h9M7.5 17h5" /></Ico>;
const IconRepeat = (p) => <Ico {...p}><path d="M17 2l4 4-4 4" /><path d="M3 11V9a4 4 0 014-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v2a4 4 0 01-4 4H3" /></Ico>;
const IconCircle = (p) => <Ico {...p}><circle cx="12" cy="12" r="8" /></Ico>;
const IconPlay = (p) => <Ico {...p}><circle cx="12" cy="12" r="8" /><path d="M10 9l5 3-5 3z" fill={p.color || "currentColor"} stroke="none" /></Ico>;
const IconCheck = (p) => <Ico {...p}><circle cx="12" cy="12" r="8" /><path d="M8.5 12.5l2.3 2.3L16 9.7" /></Ico>;
const IconTrash = (p) => <Ico {...p}><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13" /></Ico>;
const IconPencil = (p) => <Ico {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" /></Ico>;
const IconX = (p) => <Ico {...p}><path d="M18 6L6 18M6 6l12 12" /></Ico>;
const IconDownload = (p) => <Ico {...p}><path d="M12 3v12M7 10l5 5 5-5" /><path d="M4 19h16" /></Ico>;
const IconUpload = (p) => <Ico {...p}><path d="M12 21V9M7 14l5-5 5 5" /><path d="M4 5h16" /></Ico>;
const IconAlert = (p) => <Ico {...p}><path d="M12 3l10 18H2z" /><path d="M12 9v5M12 17.5v.01" /></Ico>;

/* ---------------------------------------------------------------------- */
/* Static option sets                                                     */
/* ---------------------------------------------------------------------- */
const TYPE_META = {
  appointment: { label: "موعد", icon: IconCalendar, color: C.teal, soft: C.tealSoft },
  task: { label: "مهمة", icon: IconList, color: C.gold, soft: C.goldSoft },
};
const STATUS_ORDER = ["not_started", "in_progress", "completed"];
const STATUS_META = {
  not_started: { label: "لم يبدأ", color: C.stone, soft: C.stoneSoft, icon: IconCircle },
  in_progress: { label: "قيد التنفيذ", color: C.teal, soft: C.tealSoft, icon: IconPlay },
  completed: { label: "مكتمل", color: C.green, soft: C.greenSoft, icon: IconCheck },
};
const RECUR_LABEL = { none: "بدون تكرار", daily: "يومي", weekly: "أسبوعي", monthly: "شهري", yearly: "سنوي" };
const WEEKDAY_LABELS = ["أحد", "اثنين", "ثلاثاء", "أربعاء", "خميس", "جمعة", "سبت"];
const REMINDER_OPTIONS = [
  { v: 0, l: "وقت الموعد" }, { v: 5, l: "قبل 5 دقائق" }, { v: 15, l: "قبل 15 دقيقة" },
  { v: 30, l: "قبل 30 دقيقة" }, { v: 60, l: "قبل ساعة" }, { v: 180, l: "قبل 3 ساعات" },
  { v: 1440, l: "قبل يوم" }, { v: 2880, l: "قبل يومين" }, { v: 10080, l: "قبل أسبوع" },
];

/* ---------------------------------------------------------------------- */
/* Date helpers                                                           */
/* ---------------------------------------------------------------------- */
const pad = (n) => String(n).padStart(2, "0");
const toDateStr = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const parseDateStr = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const formatTime = (dt) => {
  const h = dt.getHours(), m = dt.getMinutes();
  const period = h >= 12 ? "م" : "ص";
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${pad(h12)}:${pad(m)} ${period}`;
};
const formatDateHeader = (dateStr, today) => {
  const d = parseDateStr(dateStr);
  const diff = Math.round((startOfDay(d) - startOfDay(today)) / 86400000);
  const base = d.toLocaleDateString("ar-EG-u-nu-latn", { weekday: "long", day: "numeric", month: "long" });
  if (diff === 0) return `اليوم • ${base}`;
  if (diff === 1) return `غدًا • ${base}`;
  if (diff === -1) return `أمس • ${base}`;
  return base;
};
const reminderLabel = (mins) => REMINDER_OPTIONS.find((r) => r.v === mins)?.l || `قبل ${mins} د`;

function generateOccurrences(task, rangeStart, rangeEnd) {
  const start = startOfDay(parseDateStr(task.date));
  const rec = task.recurrence || { type: "none" };
  const hardEnd = rec.endType === "onDate" && rec.endDate ? startOfDay(parseDateStr(rec.endDate)) : null;
  const effectiveEnd = hardEnd && hardEnd < rangeEnd ? hardEnd : rangeEnd;
  const out = [];
  if (start > effectiveEnd) return out;
  if (rec.type === "none" || !rec.type) {
    if (start >= rangeStart && start <= effectiveEnd) out.push(start);
    return out;
  }
  const interval = Math.max(1, Number(rec.interval) || 1);
  if (rec.type === "daily") {
    let cur = new Date(start), guard = 0;
    while (cur <= effectiveEnd && guard < 1000) {
      if (cur >= rangeStart) out.push(new Date(cur));
      cur = addDays(cur, interval); guard++;
    }
  } else if (rec.type === "weekly") {
    const weekdays = rec.weekdays && rec.weekdays.length ? rec.weekdays : [start.getDay()];
    let weekStart = addDays(start, -start.getDay()), guard = 0;
    while (weekStart <= effectiveEnd && guard < 400) {
      for (const wd of weekdays) {
        const occ = addDays(weekStart, wd);
        if (occ >= start && occ >= rangeStart && occ <= effectiveEnd) out.push(occ);
      }
      weekStart = addDays(weekStart, 7 * interval); guard++;
    }
    out.sort((a, b) => a - b);
  } else if (rec.type === "monthly") {
    const day = start.getDate();
    let cur = new Date(start.getFullYear(), start.getMonth(), 1), guard = 0;
    while (cur <= effectiveEnd && guard < 600) {
      const lastDay = new Date(cur.getFullYear(), cur.getMonth() + 1, 0).getDate();
      const occ = new Date(cur.getFullYear(), cur.getMonth(), Math.min(day, lastDay));
      if (occ >= start && occ >= rangeStart && occ <= effectiveEnd) out.push(occ);
      cur = new Date(cur.getFullYear(), cur.getMonth() + interval, 1); guard++;
    }
  } else if (rec.type === "yearly") {
    let y = start.getFullYear(), guard = 0;
    while (guard < 150) {
      const occ = new Date(y, start.getMonth(), start.getDate());
      if (occ > effectiveEnd) break;
      if (occ >= start && occ >= rangeStart) out.push(occ);
      y += interval; guard++;
    }
  }
  return out;
}

/* ---------------------------------------------------------------------- */
/* Storage (plain localStorage — this build runs outside Claude)          */
/* ---------------------------------------------------------------------- */
const STORAGE_KEY = "mafkarti-tasks-v1";
const DISMISS_KEY = "mafkarti-dismissed-v1";
function loadJSON(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error("save failed", e); }
}
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

/* ---------------------------------------------------------------------- */
/* Small UI atoms                                                         */
/* ---------------------------------------------------------------------- */
function Pill({ color, soft, icon: Icon, children }) {
  return (
    <span className="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-medium"
      style={{ backgroundColor: soft, color }}>
      {Icon && <Icon size={13} strokeWidth={2.4} color={color} />}
      {children}
    </span>
  );
}
function Chip({ active, onClick, children }) {
  return (
    <button type="button" onClick={onClick}
      className="rounded-full px-3 py-1 text-xs font-medium border transition"
      style={active
        ? { backgroundColor: C.ink, color: "#fff", borderColor: C.ink }
        : { backgroundColor: "transparent", color: C.inkSoft, borderColor: C.line }}>
      {children}
    </button>
  );
}

/* ---------------------------------------------------------------------- */
/* Main App                                                                */
/* ---------------------------------------------------------------------- */
function App() {
  const [tasks, setTasks] = useState(() => loadJSON(STORAGE_KEY, []));
  const [dismissed, setDismissed] = useState(() => loadJSON(DISMISS_KEY, []));
  const [now, setNow] = useState(new Date());
  const [tab, setTab] = useState("today");
  const [query, setQuery] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [modalOpen, setModalOpen] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
  const fileInputRef = useRef(null);
  const notifiedRef = useRef(new Set());

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 20000); return () => clearInterval(id); }, []);

  const applyTasks = (updater) => {
    setTasks((prev) => { const next = typeof updater === "function" ? updater(prev) : updater; saveJSON(STORAGE_KEY, next); return next; });
  };
  const applyDismissed = (updater) => {
    setDismissed((prev) => { const next = typeof updater === "function" ? updater(prev) : updater; saveJSON(DISMISS_KEY, next); return next; });
  };

  const rangeStart = useMemo(() => addDays(startOfDay(now), -14), [now.toDateString()]);
  const rangeEnd = useMemo(() => addDays(startOfDay(now), 180), [now.toDateString()]);

  const occurrences = useMemo(() => {
    const list = [];
    for (const t of tasks) {
      const dates = generateOccurrences(t, rangeStart, rangeEnd);
      for (const d of dates) {
        const dateStr = toDateStr(d);
        const [hh, mm] = (t.time || "09:00").split(":").map(Number);
        const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate(), hh || 0, mm || 0);
        const status = (t.statusByDate && t.statusByDate[dateStr]) || "not_started";
        list.push({ task: t, dateStr, dt, status });
      }
    }
    list.sort((a, b) => a.dt - b.dt);
    return list;
  }, [tasks, rangeStart, rangeEnd]);

  const dueReminders = useMemo(() => {
    const active = [];
    for (const occ of occurrences) {
      if (occ.status === "completed") continue;
      const offsets = occ.task.reminders || [];
      for (const off of offsets) {
        const remTime = new Date(occ.dt.getTime() - off * 60000);
        const key = `${occ.task.id}|${occ.dateStr}|${off}`;
        if (remTime <= now && occ.dt >= now && !dismissed.includes(key)) active.push({ key, occ, off, remTime });
      }
    }
    active.sort((a, b) => a.remTime - b.remTime);
    return active;
  }, [occurrences, now, dismissed]);

  useEffect(() => {
    dueReminders.forEach((r) => {
      if (notifiedRef.current.has(r.key)) return;
      notifiedRef.current.add(r.key);
      try {
        if (typeof Notification !== "undefined" && Notification.permission === "granted") {
          new Notification(r.occ.task.title, { body: `${reminderLabel(r.off)} • ${formatTime(r.occ.dt)}` });
        }
      } catch (e) {}
    });
  }, [dueReminders]);

  const filtered = useMemo(() => {
    return occurrences.filter((o) => {
      if (typeFilter !== "all" && o.task.type !== typeFilter) return false;
      if (statusFilter !== "all" && o.status !== statusFilter) return false;
      if (query.trim()) {
        const q = query.trim().toLowerCase();
        const hay = `${o.task.title} ${o.task.description || ""}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [occurrences, typeFilter, statusFilter, query]);

  const todayStr = toDateStr(now);
  const list = useMemo(() => {
    if (tab === "today") return filtered.filter((o) => o.dateStr === todayStr);
    if (tab === "overdue") return filtered.filter((o) => o.dt < now && o.status !== "completed");
    if (tab === "upcoming") return filtered.filter((o) => o.dt >= now);
    return filtered;
  }, [filtered, tab, now, todayStr]);

  const overdueCount = useMemo(() => occurrences.filter((o) => o.dt < now && o.status !== "completed").length, [occurrences, now]);

  const grouped = useMemo(() => {
    const map = new Map();
    for (const o of list) { if (!map.has(o.dateStr)) map.set(o.dateStr, []); map.get(o.dateStr).push(o); }
    return Array.from(map.entries()).sort(([a], [b]) => (a < b ? -1 : 1));
  }, [list]);

  const cycleStatus = (taskId, dateStr, current) => {
    const idx = STATUS_ORDER.indexOf(current);
    const next = STATUS_ORDER[(idx + 1) % STATUS_ORDER.length];
    applyTasks((prev) => prev.map((t) => t.id === taskId ? { ...t, statusByDate: { ...(t.statusByDate || {}), [dateStr]: next } } : t));
  };
  const deleteTask = (id) => { applyTasks((prev) => prev.filter((t) => t.id !== id)); setConfirmDeleteId(null); };
  const openAdd = () => { setEditingTask(null); setModalOpen(true); };
  const openEdit = (task) => { setEditingTask(task); setModalOpen(true); };
  const saveTask = (form) => {
    if (editingTask) applyTasks((prev) => prev.map((t) => (t.id === editingTask.id ? { ...t, ...form } : t)));
    else applyTasks((prev) => [...prev, { id: uid(), createdAt: Date.now(), statusByDate: {}, ...form }]);
    setModalOpen(false); setEditingTask(null);
  };
  const dismissReminder = (key) => applyDismissed((prev) => [...prev, key]);
  const requestNotifPermission = () => { try { Notification.requestPermission().then((p) => setNotifPerm(p)); } catch (e) {} };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `مفكرتي-${todayStr}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { const parsed = JSON.parse(reader.result); if (Array.isArray(parsed)) applyTasks(() => parsed); } catch (err) {} };
    reader.readAsText(file); e.target.value = "";
  };

  const todayHeader = now.toLocaleDateString("ar-EG-u-nu-latn", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  return (
    <div dir="rtl" className="min-h-screen w-full" style={{ backgroundColor: C.paper }}>
      <div className="relative px-5 pt-5 pb-6 sm:px-8"
        style={{ background: `linear-gradient(135deg, ${C.ink}, #223353)`, clipPath: "polygon(0 0, 100% 0, 100% 92%, 96% 100%, 4% 100%, 0 92%)" }}>
        <div className="flex items-start justify-between gap-3">
          <div>
            <div className="flex items-center gap-2">
              <span className="inline-block h-2 w-2 rounded-full" style={{ backgroundColor: C.gold }} />
              <h1 className="text-xl sm:text-2xl text-white" style={{ fontFamily: FONT_HEAD, fontWeight: 700 }}>مفكرتي</h1>
            </div>
            <p className="mt-1 text-sm" style={{ color: "#C7D0DE", fontFamily: FONT_MONO }}>{todayHeader}</p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={exportData} title="تصدير نسخة احتياطية" className="rounded-lg p-2 text-white/80 hover:text-white hover:bg-white/10 transition"><IconDownload size={18} /></button>
            <button onClick={() => fileInputRef.current?.click()} title="استيراد نسخة احتياطية" className="rounded-lg p-2 text-white/80 hover:text-white hover:bg-white/10 transition"><IconUpload size={18} /></button>
            <input ref={fileInputRef} type="file" accept="application/json" className="hidden" onChange={importData} />
          </div>
        </div>
      </div>

      <div className="mx-auto max-w-3xl px-4 sm:px-6 -mt-3">
        <div className="flex items-center gap-2 rounded-2xl p-2 shadow-sm" style={{ backgroundColor: C.card, border: `1px solid ${C.line}` }}>
          <IconSearch size={18} color={C.stone} strokeWidth={2} />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="ابحث عن موعد أو مهمة..."
            className="flex-1 bg-transparent outline-none text-sm py-1.5" style={{ color: C.ink }} />
          <button onClick={openAdd} className="flex items-center gap-1.5 rounded-xl px-3 py-2 text-sm font-medium text-white shrink-0 transition active:scale-95" style={{ backgroundColor: C.gold }}>
            <IconPlus size={16} /> إضافة
          </button>
        </div>

        {dueReminders.length > 0 && (
          <div className="mt-4 rounded-2xl p-3 space-y-2" style={{ backgroundColor: C.rustSoft, border: `1px solid ${C.rust}33` }}>
            <div className="flex items-center gap-2 px-1">
              <IconBellRinging size={16} color={C.rust} />
              <span className="text-sm font-semibold" style={{ color: C.rust }}>تذكيرات مستحقة الآن</span>
            </div>
            {dueReminders.map((r) => (
              <div key={r.key} className="flex items-center justify-between gap-2 rounded-xl bg-white/70 px-3 py-2">
                <div className="min-w-0">
                  <p className="text-sm font-medium truncate" style={{ color: C.ink }}>{r.occ.task.title}</p>
                  <p className="text-xs" style={{ color: C.inkSoft, fontFamily: FONT_MONO }}>{reminderLabel(r.off)} • {formatTime(r.occ.dt)}</p>
                </div>
                <button onClick={() => dismissReminder(r.key)} className="shrink-0 rounded-lg px-2.5 py-1 text-xs font-medium" style={{ backgroundColor: C.rust, color: "#fff" }}>تم الاطلاع</button>
              </div>
            ))}
          </div>
        )}

        {notifPerm === "default" && (
          <button onClick={requestNotifPermission} className="mt-3 flex w-full items-center justify-center gap-2 rounded-xl border border-dashed px-3 py-2 text-xs" style={{ borderColor: C.line, color: C.inkSoft }}>
            <IconBell size={14} /> تفعيل تنبيهات المتصفح (تعمل أثناء فتح الصفحة فقط)
          </button>
        )}

        <div className="mt-5 flex items-center gap-2 overflow-x-auto pb-1">
          <Chip active={tab === "today"} onClick={() => setTab("today")}>اليوم</Chip>
          <Chip active={tab === "upcoming"} onClick={() => setTab("upcoming")}>القادمة</Chip>
          <Chip active={tab === "overdue"} onClick={() => setTab("overdue")}>متأخرة{overdueCount > 0 ? ` (${overdueCount})` : ""}</Chip>
          <Chip active={tab === "all"} onClick={() => setTab("all")}>الكل</Chip>
        </div>

        <div className="mt-2 flex flex-wrap items-center gap-1.5">
          <Chip active={typeFilter === "all"} onClick={() => setTypeFilter("all")}>كل الأنواع</Chip>
          <Chip active={typeFilter === "appointment"} onClick={() => setTypeFilter("appointment")}>مواعيد</Chip>
          <Chip active={typeFilter === "task"} onClick={() => setTypeFilter("task")}>مهام</Chip>
          <span className="mx-1 h-4 w-px" style={{ backgroundColor: C.line }} />
          <Chip active={statusFilter === "all"} onClick={() => setStatusFilter("all")}>كل الحالات</Chip>
          <Chip active={statusFilter === "not_started"} onClick={() => setStatusFilter("not_started")}>لم يبدأ</Chip>
          <Chip active={statusFilter === "in_progress"} onClick={() => setStatusFilter("in_progress")}>قيد التنفيذ</Chip>
          <Chip active={statusFilter === "completed"} onClick={() => setStatusFilter("completed")}>مكتمل</Chip>
        </div>

        <div className="mt-5 pb-16">
          {grouped.length === 0 ? (
            <div className="rounded-2xl border border-dashed py-14 text-center" style={{ borderColor: C.line }}>
              <IconList size={28} color={C.stone} strokeWidth={1.6} />
              <p className="mt-3 text-sm font-medium" style={{ color: C.ink }}>
                {tab === "overdue" ? "لا شيء متأخر — كل شيء تحت السيطرة" : "لا توجد عناصر هنا بعد"}
              </p>
              {tab !== "overdue" && <p className="mt-1 text-xs" style={{ color: C.stone }}>اضغط «إضافة» لتسجيل أول موعد أو مهمة في مفكرتك</p>}
            </div>
          ) : (
            <div className="space-y-6">
              {grouped.map(([dateStr, items]) => (
                <div key={dateStr}>
                  <div className="mb-2 flex items-center gap-2 px-1">
                    <span className="h-px flex-1" style={{ backgroundColor: C.line }} />
                    <h3 className="text-xs font-semibold whitespace-nowrap" style={{ color: C.inkSoft }}>{formatDateHeader(dateStr, now)}</h3>
                    <span className="h-px flex-1" style={{ backgroundColor: C.line }} />
                  </div>
                  <div className="space-y-2">
                    {items.map((o) => {
                      const tMeta = TYPE_META[o.task.type] || TYPE_META.task;
                      const sMeta = STATUS_META[o.status];
                      const isOverdue = o.dt < now && o.status !== "completed";
                      return (
                        <div key={`${o.task.id}-${o.dateStr}`} className="group flex items-center gap-3 rounded-2xl p-3 shadow-sm"
                          style={{ backgroundColor: C.card, border: `1px solid ${isOverdue ? C.rust + "55" : C.line}` }}>
                          <button onClick={() => cycleStatus(o.task.id, o.dateStr, o.status)} title="اضغط لتغيير الحالة"
                            className="shrink-0 rounded-full p-1.5 transition active:scale-90" style={{ backgroundColor: sMeta.soft }}>
                            <sMeta.icon size={20} color={sMeta.color} strokeWidth={2.2} />
                          </button>
                          <div className="min-w-0 flex-1">
                            <p className="truncate text-sm font-medium" style={{ color: C.ink }}>{o.task.title}</p>
                            <div className="mt-1 flex flex-wrap items-center gap-1.5">
                              <span className="text-xs" style={{ fontFamily: FONT_MONO, color: isOverdue ? C.rust : C.inkSoft }}>{formatTime(o.dt)}</span>
                              <Pill color={tMeta.color} soft={tMeta.soft} icon={tMeta.icon}>{tMeta.label}</Pill>
                              {o.task.recurrence?.type && o.task.recurrence.type !== "none" && (
                                <Pill color={C.inkSoft} soft={C.stoneSoft} icon={IconRepeat}>{RECUR_LABEL[o.task.recurrence.type]}</Pill>
                              )}
                              {o.task.reminders?.length > 0 && <Pill color={C.gold} soft={C.goldSoft} icon={IconBell}>{o.task.reminders.length}</Pill>}
                              {isOverdue && <span className="inline-flex items-center gap-1 text-xs font-medium" style={{ color: C.rust }}><IconAlert size={12} color={C.rust} /> متأخر</span>}
                            </div>
                          </div>
                          <div className="flex shrink-0 items-center gap-1 opacity-70 group-hover:opacity-100 transition">
                            <button onClick={() => openEdit(o.task)} className="rounded-lg p-1.5 hover:bg-black/5"><IconPencil size={15} color={C.inkSoft} /></button>
                            <button onClick={() => setConfirmDeleteId(o.task.id)} className="rounded-lg p-1.5 hover:bg-black/5"><IconTrash size={15} color={C.rust} /></button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {modalOpen && <TaskModal initial={editingTask} onClose={() => { setModalOpen(false); setEditingTask(null); }} onSave={saveTask} />}

      {confirmDeleteId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={() => setConfirmDeleteId(null)}>
          <div onClick={(e) => e.stopPropagation()} className="w-full max-w-sm rounded-2xl p-5" style={{ backgroundColor: C.card }}>
            <p className="text-sm font-medium" style={{ color: C.ink }}>هل تريد حذف هذا العنصر نهائيًا؟</p>
            <p className="mt-1 text-xs" style={{ color: C.stone }}>سيتم حذف جميع تكراراته وسجل حالاته ولا يمكن التراجع عن ذلك.</p>
            <div className="mt-4 flex gap-2">
              <button onClick={() => setConfirmDeleteId(null)} className="flex-1 rounded-xl py-2 text-sm font-medium" style={{ backgroundColor: C.stoneSoft, color: C.ink }}>إلغاء</button>
              <button onClick={() => deleteTask(confirmDeleteId)} className="flex-1 rounded-xl py-2 text-sm font-medium text-white" style={{ backgroundColor: C.rust }}>حذف</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TaskModal({ initial, onClose, onSave }) {
  const todayStr = toDateStr(new Date());
  const [title, setTitle] = useState(initial?.title || "");
  const [description, setDescription] = useState(initial?.description || "");
  const [type, setType] = useState(initial?.type || "task");
  const [date, setDate] = useState(initial?.date || todayStr);
  const [time, setTime] = useState(initial?.time || "09:00");
  const [recurType, setRecurType] = useState(initial?.recurrence?.type || "none");
  const [interval, setIntervalVal] = useState(initial?.recurrence?.interval || 1);
  const [weekdays, setWeekdays] = useState(initial?.recurrence?.weekdays || []);
  const [endType, setEndType] = useState(initial?.recurrence?.endType || "never");
  const [endDate, setEndDate] = useState(initial?.recurrence?.endDate || "");
  const [reminders, setReminders] = useState(initial?.reminders || [30]);
  const [error, setError] = useState("");

  const toggleWeekday = (i) => setWeekdays((prev) => (prev.includes(i) ? prev.filter((x) => x !== i) : [...prev, i].sort()));
  const toggleReminder = (v) => setReminders((prev) => (prev.includes(v) ? prev.filter((x) => x !== v) : [...prev, v].sort((a, b) => a - b)));

  const submit = () => {
    if (!title.trim()) { setError("الرجاء إدخال عنوان"); return; }
    if (!date) { setError("الرجاء اختيار التاريخ"); return; }
    onSave({
      title: title.trim(), description: description.trim(), type, date, time,
      recurrence: { type: recurType, interval: Number(interval) || 1, weekdays: recurType === "weekly" ? weekdays : [], endType, endDate: endType === "onDate" ? endDate : null },
      reminders,
    });
  };
  const intervalUnit = { daily: "يوم", weekly: "أسبوع", monthly: "شهر", yearly: "سنة" }[recurType];

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={onClose}>
      <div dir="rtl" onClick={(e) => e.stopPropagation()} className="w-full sm:max-w-lg max-h-[92vh] overflow-y-auto rounded-t-3xl sm:rounded-2xl p-5" style={{ backgroundColor: C.card }}>
        <div className="flex items-center justify-between">
          <h2 className="text-base font-semibold" style={{ color: C.ink, fontFamily: FONT_HEAD }}>{initial ? "تعديل العنصر" : "إضافة موعد أو مهمة"}</h2>
          <button onClick={onClose} className="rounded-lg p-1.5 hover:bg-black/5"><IconX size={18} color={C.inkSoft} /></button>
        </div>
        <div className="mt-4 space-y-4">
          <div className="flex gap-2">
            {Object.entries(TYPE_META).map(([k, m]) => (
              <button key={k} onClick={() => setType(k)} className="flex flex-1 items-center justify-center gap-1.5 rounded-xl py-2 text-sm font-medium border transition"
                style={type === k ? { backgroundColor: m.soft, color: m.color, borderColor: m.color } : { backgroundColor: "transparent", color: C.inkSoft, borderColor: C.line }}>
                <m.icon size={15} color={type === k ? m.color : C.inkSoft} /> {m.label}
              </button>
            ))}
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: C.inkSoft }}>العنوان</label>
            <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="مثال: اجتماع مع الفريق"
              className="mt-1 w-full rounded-xl border px-3 py-2 text-sm outline-none" style={{ borderColor: C.line, color: C.ink }} />
          </div>
          <div>
            <label className="text-xs font-medium" style={{ color: C.inkSoft }}>ملاحظات (اختياري)</label>
            <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows={2}
              className="mt-1 w-full rounded-xl border px-3 py-2 text-sm outline-none resize-none" style={{ borderColor: C.line, color: C.ink }} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-medium" style={{ color: C.inkSoft }}>التاريخ</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="mt-1 w-full rounded-xl border px-3 py-2 text-sm outline-none" style={{ borderColor: C.line, color: C.ink, fontFamily: FONT_MONO }} />
            </div>
            <div>
              <label className="text-xs font-medium" style={{ color: C.inkSoft }}>الوقت</label>
              <input type="time" value={time} onChange={(e) => setTime(e.target.value)} className="mt-1 w-full rounded-xl border px-3 py-2 text-sm outline-none" style={{ borderColor: C.line, color: C.ink, fontFamily: FONT_MONO }} />
            </div>
          </div>
          <div className="rounded-xl p-3" style={{ backgroundColor: C.paper }}>
            <label className="text-xs font-medium" style={{ color: C.inkSoft }}>التكرار</label>
            <div className="mt-2 flex flex-wrap gap-1.5">
              {Object.entries(RECUR_LABEL).map(([k, l]) => <Chip key={k} active={recurType === k} onClick={() => setRecurType(k)}>{l}</Chip>)}
            </div>
            {recurType !== "none" && (
              <>
                <div className="mt-3 flex items-center gap-2">
                  <span className="text-xs" style={{ color: C.inkSoft }}>كل</span>
                  <input type="number" min={1} value={interval} onChange={(e) => setIntervalVal(e.target.value)} className="w-16 rounded-lg border px-2 py-1 text-sm text-center" style={{ borderColor: C.line, color: C.ink }} />
                  <span className="text-xs" style={{ color: C.inkSoft }}>{intervalUnit}</span>
                </div>
                {recurType === "weekly" && (
                  <div className="mt-3 flex flex-wrap gap-1.5">
                    {WEEKDAY_LABELS.map((wl, i) => <Chip key={i} active={weekdays.includes(i)} onClick={() => toggleWeekday(i)}>{wl}</Chip>)}
                  </div>
                )}
                <div className="mt-3 flex flex-wrap items-center gap-2">
                  <Chip active={endType === "never"} onClick={() => setEndType("never")}>بدون نهاية</Chip>
                  <Chip active={endType === "onDate"} onClick={() => setEndType("onDate")}>ينتهي بتاريخ</Chip>
                  {endType === "onDate" && <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="rounded-lg border px-2 py-1 text-xs" style={{ borderColor: C.line, color: C.ink, fontFamily: FONT_MONO }} />}
                </div>
              </>
            )}
          </div>
          <div>
            <label className="text-xs font-medium flex items-center gap-1.5" style={{ color: C.inkSoft }}><IconBell size={13} color={C.inkSoft} /> التذكيرات (يمكن اختيار أكثر من موعد)</label>
            <div className="mt-2 flex flex-wrap gap-1.5">
              {REMINDER_OPTIONS.map((r) => <Chip key={r.v} active={reminders.includes(r.v)} onClick={() => toggleReminder(r.v)}>{r.l}</Chip>)}
            </div>
            <p className="mt-1.5 text-xs" style={{ color: C.stone }}>التذكيرات تظهر داخل التطبيق وكإشعار متصفح أثناء فتح الصفحة.</p>
          </div>
          {error && <p className="text-xs font-medium" style={{ color: C.rust }}>{error}</p>}
        </div>
        <div className="mt-5 flex gap-2">
          <button onClick={onClose} className="flex-1 rounded-xl py-2.5 text-sm font-medium" style={{ backgroundColor: C.stoneSoft, color: C.ink }}>إلغاء</button>
          <button onClick={submit} className="flex-1 rounded-xl py-2.5 text-sm font-medium text-white" style={{ backgroundColor: C.gold }}>{initial ? "حفظ التعديلات" : "إضافة"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => {}); });
}
</script>
</body>
</html>
